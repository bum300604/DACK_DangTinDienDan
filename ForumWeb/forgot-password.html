<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quên mật khẩu — ĐăngTin Diễn đàn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/site.css" />
  </head>
  <body class="forum-body">
    <header class="forum-topbar">
      <a href="index.html" class="forum-brand">
        <span class="forum-brand__logo" aria-hidden="true">DT</span>
        <span class="forum-brand__text">
          <span class="forum-brand__name">ĐăngTin Diễn đàn</span>
          <span class="forum-brand__tagline">Rao vặt · Mua bán · Trao đổi</span>
        </span>
      </a>
      <nav class="nav-actions">
        <div id="nav-guest">
          <a class="btn btn-outline" href="index.html">Trang chủ</a>
          <a class="btn btn-outline" href="login.html">Đăng nhập</a>
        </div>
        <div id="nav-user" class="nav-user-row d-none">
          <span id="nav-user-label" class="muted"></span>
          <span id="nav-role-badge" class="badge badge-user"></span>
          <a class="btn btn-outline" href="my-posts.html">Bài viết của tôi</a>
          <a class="btn btn-outline" href="my-reports.html">Báo cáo</a>
          <a class="btn btn-outline" href="profile.html">Hồ sơ</a>
          <a class="btn btn-outline nav-admin-link d-none" href="admin.html">Quản trị</a>
          <button type="button" class="btn btn-ghost" id="nav-logout">Đăng xuất</button>
        </div>
      </nav>
    </header>

    <main class="auth-wrap">
      <div class="auth-card">
        <h1>Quên mật khẩu</h1>
        <p class="auth-lead">
          Nhập email đã đăng ký để nhận mã OTP (DienDanWeb). Mỗi lần gửi sẽ tạo mã mới.
        </p>
        <div id="fp-alert" class="alert alert-danger d-none"></div>
        <form id="fp-form">
          <div class="form-group">
            <label for="fp-email">Email</label>
            <input id="fp-email" name="email" type="email" autocomplete="email" required />
          </div>
          <button type="button" class="btn btn-outline" style="width: 100%" id="fp-send-otp">
            Gửi mã OTP
          </button>
          <hr class="mt-1" />
          <div class="form-group">
            <label for="fp-otp">Mã OTP (6 số)</label>
            <input
              id="fp-otp"
              name="otp"
              inputmode="numeric"
              pattern="[0-9]{6}"
              maxlength="6"
              autocomplete="one-time-code"
              placeholder="123456"
            />
          </div>
          <div class="form-group">
            <label for="fp-newpw">Mật khẩu mới</label>
            <input
              id="fp-newpw"
              name="newPassword"
              type="password"
              autocomplete="new-password"
              minlength="8"
            />
          </div>
          <div class="form-group">
            <label for="fp-newpw2">Nhập lại mật khẩu mới</label>
            <input
              id="fp-newpw2"
              name="newPassword2"
              type="password"
              autocomplete="new-password"
              minlength="8"
            />
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%">Đặt lại mật khẩu</button>
        </form>
        <p class="text-center muted mt-1">
          <a href="login.html">← Quay lại đăng nhập</a>
        </p>
      </div>
    </main>

    <footer class="forum-footer">
      <span>© ĐăngTin Diễn đàn</span>
      <a href="index.html">Trang chủ</a>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/auth-nav.js"></script>
    <script src="js/forgot-password-page.js"></script>
  </body>
</html>
